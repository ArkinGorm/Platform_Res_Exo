services:
  db:
    image: postgres:16  # PostgreSQL 16
    container_name: plateforme_Res_Exo
    restart: unless-stopped
    environment:
      POSTGRES_DB: plateforme_Res_Exo_db
      POSTGRES_USER: olivier
      POSTGRES_PASSWORD: Olivier1@.$
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olivier -d plateforme_Res_Exo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platforme_network

  redis:
    image: redis:7-alpine
    container_name: platforme_Res_Exo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck: 
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: 
      - platforme_network

  web:
    build: .
    container_name: plateforme_Res_Exo_web
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /var/run/docker.sock:/var/run/docker.sock # Pour acceder à docker depuis le conteneur
    ports:
      - "8000:8000"
    environment:
      DB_NAME: plateforme_Res_Exo_db
      DB_USER: olivier
      DB_PASSWORD: Olivier1@.$
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: 'True'
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platforme_network

  celery_worker:
    build: .
    container_name: platforme_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock  # pour acceder à docker 
    environment:
      DB_NAME: plateforme_Res_Exo_db
      DB_USER: olivier
      DB_PASSWORD: Olivier1@.$
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: 'True'
    depends_on:
      - web
      - redis
    networks:
      - platforme_network

  adminer:
    image: adminer:latest
    container_name: plateforme_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - db
    networks:
      - platforme_network
  # Optionnel: PgAdmin pour une interface plus complète
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: plateforme_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  pgadmin_data:
networks:
  platforme_network:
    driver: bridge

